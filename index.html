<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Productivity Hub</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:system-ui;
background:linear-gradient(135deg,#e3f2fd,#ffffff);
transition:0.3s;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
padding:12px 16px;
background:#fff;
box-shadow:0 2px 10px rgba(0,0,0,.05);
position:sticky;top:0;
}

/* CARD */
.card{
background:#fff;
margin:14px;
padding:16px;
border-radius:14px;
box-shadow:0 4px 12px rgba(0,0,0,.05);
}

/* STATS */
.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
gap:10px;
}
.stat{
background:#f5f7fb;
padding:12px;
border-radius:10px;
text-align:center;
}

/* INPUT */
input,textarea,select{
width:100%;
padding:8px;
margin-top:6px;
border-radius:8px;
border:1px solid #ddd;
}

/* BUTTON */
button{
padding:10px;
border:none;
border-radius:8px;
background:#4f46e5;
color:#fff;
cursor:pointer;
}

/* QUOTE */
.quote{
margin:14px;
padding:12px;
background:#eef2ff;
border-left:4px solid #4f46e5;
border-radius:10px;
}

/* LOGIN */
#login{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
height:100vh;
gap:10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<h2>Welcome</h2>
<input id="name" placeholder="Enter your name">
<select id="exam">
<option value="neet">NEET</option>
<option value="jee">JEE</option>
<option value="cuet">CUET</option>
<option value="other">Other</option>
</select>
<button onclick="saveUser()">Start</button>
<button onclick="googleLogin()">Login with Google</button>
</div>

<!-- APP -->
<div id="app" style="display:none">

<header>
<h3 id="userText"></h3>
<button onclick="logout()">Logout</button>
</header>

<div class="quote" id="quote"></div>

<div class="card">
<div class="stats">
<div class="stat">Hours<br><b id="hoursT">0</b></div>
<div class="stat">Points<br><b id="points">0</b></div>
<div class="stat">Streak<br><b id="streak">0</b></div>
</div>
</div>

<div class="card">
<h4>Study Time</h4>
<input id="h" placeholder="Hours">
<input id="m" placeholder="Minutes">
<input id="s" placeholder="Seconds">
<button onclick="addTime()">Add</button>
</div>

<div class="card">
<h4>Routine</h4>
<textarea id="did" placeholder="What I did"></textarea>
<textarea id="will" placeholder="What I will do"></textarea>
<textarea id="achieved" placeholder="What I achieved"></textarea>
<textarea id="regret" placeholder="What I regret"></textarea>
<button onclick="saveRoutine()">Save</button>
</div>

<div class="card">
<h4>Timetable</h4>
<input id="days" placeholder="Days left">
<button onclick="genPlan()">Generate</button>
<div id="plan"></div>
</div>

<div class="card">
<h4>Analytics</h4>
<canvas id="chart"></canvas>
</div>

</div>

<script type="module">

/* 🔥 FIREBASE */
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
apiKey:"YOUR_API_KEY",
authDomain:"YOUR_DOMAIN",
projectId:"YOUR_PROJECT_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

/* STATE */
let data = JSON.parse(localStorage.getItem("data")) || {
hours:0,points:0,streak:0
};

/* QUOTES (30+) */
const quotes=[
"Push yourself, because no one else will",
"Consistency beats motivation",
"Success is daily habits",
"Discipline > Motivation",
"Small progress is progress",
"Focus on your goal",
"Hard work pays off",
"Never quit",
"Stay hungry stay foolish",
"Be better every day",
"Dream big work hard",
"Your future needs you",
"Study now shine later",
"Pain is temporary",
"Effort creates success",
"Believe in yourself",
"Stay consistent",
"Work smarter",
"Keep going",
"Don’t stop",
"Make it happen",
"You can do it",
"Push limits",
"Level up",
"Stay focused",
"Grind daily",
"Keep learning",
"Stay strong",
"No excuses",
"Be unstoppable"
];

/* INIT */
window.onload=()=>{
let name=localStorage.getItem("name");
if(name){
startApp();
}
showQuote();
};

/* LOGIN */
window.saveUser=()=>{
localStorage.setItem("name",name.value);
localStorage.setItem("exam",exam.value);
startApp();
};

window.googleLogin=()=>signInWithPopup(auth,provider);
window.logout=()=>signOut(auth);

/* START */
function startApp(){
login.style.display="none";
app.style.display="block";
userText.innerText="Hello "+localStorage.getItem("name");
update();
}

/* QUOTE */
function showQuote(){
let day=new Date().getDate();
quote.innerText=quotes[day%quotes.length];
}

/* STUDY TIME */
window.addTime=()=>{
let sec=(+h.value*3600)+(+m.value*60)+(+s.value);
if(sec<=0)return;

data.hours += sec/3600;
data.points += Math.floor(sec/60);
data.streak += 1;

localStorage.setItem("data",JSON.stringify(data));
update();
};

/* ROUTINE */
window.saveRoutine=()=>{
localStorage.setItem("routine",JSON.stringify({
did:did.value,
will:will.value,
achieved:achieved.value,
regret:regret.value
}));
};

/* TIMETABLE */
window.genPlan=()=>{
let d=+days.value;
let hrs=d>60?6:d>30?8:10;
plan.innerText="Study "+hrs+" hrs/day";
};

/* UPDATE */
function update(){
hoursT.innerText=data.hours.toFixed(1);
points.innerText=data.points;
streak.innerText=data.streak;
drawChart();
}

/* CHART */
let chart;
function drawChart(){
if(chart)chart.destroy();
chart=new Chart(chartCanvas,{
type:"bar",
data:{
labels:["Hours","Points"],
datasets:[{data:[data.hours,data.points]}]
}
});
}

</script>

</body>
</html>
