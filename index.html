<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rank Rise – by Pushpendra</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>

<style>
/* =========================
   ROOT + RESET
========================= */
*{margin:0;padding:0;box-sizing:border-box;}

:root{
  --accent:#1d9e75;
  --bg:#f5f7fb;
  --card:#ffffff;
  --text:#111;
  --muted:#6b7280;
}

body{
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
}

/* =========================
   HEADER (NEW)
========================= */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px;
  background:#fff;
  position:sticky;
  top:0;
  z-index:10;
  box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.brand{
  display:flex;
  gap:10px;
  align-items:center;
}

.logo{
  width:36px;
  height:36px;
  border-radius:10px;
  background:var(--accent);
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
  font-weight:800;
}

.brand-text{
  font-size:14px;
}

.brand-text b{
  display:block;
}

.streak{
  font-weight:800;
  color:var(--accent);
}

/* =========================
   HERO
========================= */
.hero{
  padding:16px;
}

.hero-card{
  background:linear-gradient(135deg,#e8fff6,#ffffff);
  border-radius:20px;
  padding:20px;
}

.countdown{
  font-size:28px;
  font-weight:900;
}

/* =========================
   STATS
========================= */
.stats{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:14px;
}

.stat{
  background:#fff;
  padding:14px;
  border-radius:16px;
}

.stat h3{
  font-size:12px;
  color:var(--muted);
}

.stat b{
  font-size:20px;
}

/* =========================
   DPP
========================= */
.dpp-card{
  margin:14px;
  padding:16px;
  background:#fff;
  border-radius:16px;
}

.subject{
  margin-top:8px;
  font-size:13px;
}

/* =========================
   TIMER
========================= */
.timer{
  margin:14px;
  padding:16px;
  background:#fff;
  border-radius:16px;
  text-align:center;
}

.timer-display{
  font-size:32px;
  font-weight:900;
}

.timer button{
  margin:6px;
}

/* =========================
   NAV BAR
========================= */
.bottom-nav{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  justify-content:space-around;
  background:#fff;
  padding:10px;
  box-shadow:0 -5px 15px rgba(0,0,0,0.05);
}

.bottom-nav button{
  background:none;
  border:none;
  font-size:12px;
}

/* ========================= */
</style>
</head>

<body>

<div class="header">
  <div class="brand">
    <div class="logo">RR</div>
    <div class="brand-text">
      <b>Rank Rise</b>
      <span>by Pushpendra</span>
    </div>
  </div>

  <div class="streak" id="streakDisplay">🔥 0</div>
</div>

<div class="hero">
  <div class="hero-card">
    <div id="examName">NEET</div>
    <div class="countdown" id="countdown">--</div>
    <div id="daysLeft">-- days left</div>
  </div>
</div>

<div class="stats">
  <div class="stat">
    <h3>Study Hours</h3>
    <b id="hours">0</b>
  </div>

  <div class="stat">
    <h3>DPP Solved</h3>
    <b id="dppTotal">0</b>
  </div>

  <div class="stat">
    <h3>Lectures</h3>
    <b id="lectures">0</b>
  </div>

  <div class="stat">
    <h3>Productivity</h3>
    <b id="productivity">0%</b>
  </div>
</div>

<div class="dpp-card">
  <h3>DPP Subject Wise</h3>
  <div id="dppSubjects"></div>

  <select id="dppSubjectSelect">
    <option>Physics</option>
    <option>Chemistry</option>
    <option>Biology</option>
  </select>

  <button onclick="addDPP()">Add DPP</button>
</div>

<div class="timer">
  <div class="timer-display" id="timer">00:00:00</div>
  <button onclick="start()">Start</button>
  <button onclick="stop()">Stop</button>
</div>

<div class="bottom-nav">
  <button>Dashboard</button>
  <button>Study</button>
  <button>Log</button>
  <button>Mock</button>
  <button>More</button>
</div>

<script>

/* =========================
   STATE
========================= */
let data = JSON.parse(localStorage.getItem("rankrise")) || {
  studySeconds:0,
  dpp:{Physics:0,Chemistry:0,Biology:0},
  lectures:0,
  streak:0
};

/* =========================
   TIMER
========================= */
let timer=0,interval;

function start(){
  interval=setInterval(()=>{
    timer++;
    document.getElementById("timer").innerText=format(timer);
  },1000);
}

function stop(){
  clearInterval(interval);
  data.studySeconds+=timer;
  timer=0;
  save();
  render();
}

function format(s){
  let h=Math.floor(s/3600);
  let m=Math.floor((s%3600)/60);
  let sec=s%60;
  return `${h}:${m}:${sec}`;
}

/* =========================
   DPP
========================= */
function addDPP(){
  let sub=document.getElementById("dppSubjectSelect").value;
  data.dpp[sub]++;
  save();
  render();
}

/* =========================
   SAVE
========================= */
function save(){
  localStorage.setItem("rankrise",JSON.stringify(data));
}

/* =========================
   RENDER
========================= */
function render(){
  document.getElementById("hours").innerText=(data.studySeconds/3600).toFixed(1);
  document.getElementById("lectures").innerText=data.lectures;

  let total=Object.values(data.dpp).reduce((a,b)=>a+b,0);
  document.getElementById("dppTotal").innerText=total;

  document.getElementById("streakDisplay").innerText="🔥 "+data.streak;

  let html="";
  for(let k in data.dpp){
    html+=`<div class="subject">${k}: ${data.dpp[k]}</div>`;
  }
  document.getElementById("dppSubjects").innerHTML=html;
}

/* =========================
   COUNTDOWN
========================= */
let examDate=new Date("2026-05-03");

function updateCountdown(){
  let now=new Date();
  let diff=examDate-now;

  let d=Math.floor(diff/86400000);
  document.getElementById("daysLeft").innerText=d+" days left";
}

setInterval(updateCountdown,1000);

/* ========================= */
render();

</script>

</body>
</html>
